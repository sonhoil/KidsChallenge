name: kids_challenge
description: 아이들에게 미션을 부여하고 리워드를 주는 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.2
  # web 패키지는 dio가 필요할 때만 포함되도록 함 (Android 빌드 시 제외)
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  path_provider: ^2.1.1
  
  # Navigation
  go_router: ^13.0.0
  
  # Icons
  flutter_slidable: ^3.0.0
  
  # Social Login
  kakao_flutter_sdk: ^1.3.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon.png
  remove_alpha_ios: true