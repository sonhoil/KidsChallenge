plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.kidspoint.kids_challenge"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.kidspoint.kids_challenge"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
    
    // 의존성 버전 충돌 해결
    // 주의: 너무 낮은 androidx.core 버전을 강제하면 Flutter 엔진이 사용하는
    // EditorInfoCompat 등의 메서드가 없어 NoSuchMethodError 가 발생하고,
    // 너무 높은 버전(예: 1.17.0)은 AGP 8.9.1 이상을 요구합니다.
    // -> AGP 8.3.0 에서 사용 가능한 선에서 충분히 최신인 1.15.0으로 맞춥니다.
    configurations.all {
        resolutionStrategy {
            // AGP 요구사항 때문에 너무 높은 버전이 올라가는 것을 막기 위해 browser/core 계열 버전 고정
            force 'androidx.browser:browser:1.7.0'
            force 'androidx.core:core:1.15.0'
            force 'androidx.core:core-ktx:1.15.0'
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
